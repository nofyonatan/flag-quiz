<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF_8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flag Quiz</title>
        <link rel="stylesheet" href="quiz.css">
    </head>
    <body>
        <div id="quiz-container">
            <h1>Guess the Flag</h1>
             <h2 id="questions"></h2>
            <h1>Correct: <span id="correct-answers"></span></h1>
            <img id="flag-image">

            <button id="option2">option 2</button>

            <button id="next-question" style="background-color: orange;" hidden>Next Question</button>
        </div>
        <div id="endScreen">
            <h1 id="questions-finish"></h1>
            <button id="restartBtn">🔄 Restart</button>
        </div>
        <script src="quiz.js"></script>
    </body>
</html>
